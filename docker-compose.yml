services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: minetrack-db-1
    environment:
      - POSTGRES_DB=minetrack
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minetrack"]
      interval: 3s
      timeout: 3s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: minetrack-redis-1
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    container_name: minetrack-backend-1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/minetrack
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
volumes:
  pgdata:
